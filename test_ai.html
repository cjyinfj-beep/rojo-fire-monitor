<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 接口测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #4caf50; margin-bottom: 20px; }
        .card {
            background: #151d2f;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }
        label { display: block; color: #888; margin-bottom: 8px; font-size: 14px; }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a3a5c;
            background: #1a2340;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
        }
        button {
            background: #4caf50;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        button:disabled { background: #2a5c2a; cursor: not-allowed; }
        .result {
            background: #1a2340;
            border-radius: 8px;
            padding: 15px;
            min-height: 60px;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 14px;
            line-height: 1.6;
        }
        .result.success { color: #4caf50; }
        .result.error { color: #ff5252; }
        .loading { color: #888; }
        .small { color: #666; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🤖 AI 接口测试</h1>

    <div class="card">
        <h3 style="color:#4caf50;margin-bottom:10px;">📡 设备数据</h3>
        <button onclick="getDevices()">获取设备数据</button>
        <div id="devices" class="result"></div>
    </div>

    <div class="card">
        <h3 style="color:#4caf50;margin-bottom:10px;">💬 AI 对话</h3>
        <label>你的问题：</label>
        <input type="text" id="query" placeholder="例如：温度是多少？" value="温度是多少">
        <button onclick="askAI()">发送请求</button>
        <div id="aiResult" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://172.20.10.3:5000';


        async function getDevices() {
            const el = document.getElementById('devices');
            el.textContent = '加载中...';
            el.className = 'result loading';
            try {
                const res = await fetch(API_BASE + '/api/devices');
                const data = await res.json();
                el.textContent = JSON.stringify(data, null, 2);
                el.className = 'result success';
            } catch (e) {
                el.textContent = '错误: ' + e.message;
                el.className = 'result error';
            }
        }

        async function askAI() {
            const query = document.getElementById('query').value.trim();
            if (!query) {
                alert('请输入问题');
                return;
            }
            const el = document.getElementById('aiResult');
            el.textContent = 'AI 思考中...';
            el.className = 'result loading';
            try {
                const res = await fetch(API_BASE + '/api/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await res.json();
                if (data.success) {
                    el.textContent = data.reply;
                    el.className = 'result success';
                } else {
                    el.textContent = '错误: ' + (data.error || '未知错误');
                    el.className = 'result error';
                }
            } catch (e) {
                el.textContent = '请求失败: ' + e.message;
                el.className = 'result error';
            }
        }
    </script>
</body>
</html>
