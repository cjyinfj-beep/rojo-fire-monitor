services:
  - type: web
    name: rojo-fire-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rojo-db
          property: connectionString
      - key: EMQX_HOST
        value: 139.196.153.51
      - key: EMQX_PORT
        value: 1883

databases:
  - name: rojo-db
    databaseName: rojo_fire
    user: rojo
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
