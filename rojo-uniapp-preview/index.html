<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消防监测 - 设备列表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f6fa;
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ===== 使用 Unicode 符号作为图标（100% 兼容） ===== */
.icon { display: inline-block; font-style: normal; font-weight: normal; line-height: 1; }

/* 状态栏 */
.status-bar {
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
  padding: 24px 16px;
  margin: 12px;
  border-radius: 16px;
  color: #fff;
}
.stat-item { text-align: center; }
.stat-num {
  font-size: 36px;
  font-weight: bold;
  display: block;
}
.stat-num.alarm { color: #ffe58f; }
.stat-label {
  font-size: 14px;
  opacity: 0.85;
  margin-top: 4px;
  display: block;
}

/* 设备卡片 */
.device-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin: 0 12px 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: transform 0.2s;
}
.device-card:hover { transform: translateY(-2px); }
.device-card.alarm-card {
  border: 2px solid #ff4d4f;
  background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
  animation: pulse-border 1.5s ease-in-out infinite;
}
@keyframes pulse-border {
  0%, 100% { border-color: #ff4d4f; }
  50% { border-color: #ffccc7; }
}

/* 卡片头部 */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}
.device-name {
  font-size: 20px;
  font-weight: bold;
  color: #333;
  display: block;
}
.device-location {
  font-size: 13px;
  color: #999;
  margin-top: 4px;
  display: block;
}

.status-badge {
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.status-normal {
  background: #f6ffed;
  color: #52c41a;
}
.status-alarm {
  background: #fff2f0;
  color: #ff4d4f;
}
.status-offline {
  background: #f5f5f5;
  color: #999;
}

/* 传感器网格 */
.sensor-grid {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-top: 1px solid #f0f0f0;
  border-bottom: 1px solid #f0f0f0;
}
.sensor-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}
.sensor-icon {
  font-size: 20px;
  margin-bottom: 4px;
  color: #666;
}
.sensor-value {
  font-size: 20px;
  font-weight: 600;
  color: #333;
}
.sensor-label {
  font-size: 12px;
  color: #999;
  margin-top: 2px;
}

/* 报警原因 */
.alarm-reason {
  margin-top: 12px;
  padding: 10px 14px;
  background: #fff2f0;
  border-radius: 8px;
  color: #ff4d4f;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* 更新时间 */
.update-time {
  margin-top: 10px;
  font-size: 12px;
  color: #bbb;
  text-align: right;
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  display: block;
}
.empty-text {
  font-size: 18px;
  color: #999;
  margin: 12px 0 8px;
  display: block;
}
.empty-hint {
  font-size: 13px;
  color: #bbb;
}

/* TabBar */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  display: flex;
  background: #fff;
  border-top: 1px solid #eee;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  color: #999;
  text-decoration: none;
  gap: 2px;
}
.tab-item.active {
  color: #ff6b6b;
}
.tab-icon {
  font-size: 20px;
  line-height: 1;
}
.tab-label {
  font-size: 11px;
}

/* 底部留白 */
.bottom-spacer { height: 60px; }

/* 刷新提示 */
.refresh-hint {
  text-align: center;
  font-size: 12px;
  color: #ccc;
  padding: 12px;
}
</style>
</head>
<body>

<!-- 统计栏 -->
<div class="status-bar">
  <div class="stat-item">
    <span class="stat-num">2</span>
    <span class="stat-label">设备总数</span>
  </div>
  <div class="stat-item">
    <span class="stat-num" style="color:#52c41a">2</span>
    <span class="stat-label">在线设备</span>
  </div>
  <div class="stat-item">
    <span class="stat-num alarm">1</span>
    <span class="stat-label">报警中</span>
  </div>
</div>

<!-- 设备 1：正常状态 -->
<div class="device-card" onclick="location.href='detail.html?id=EX-001'">
  <div class="card-header">
    <div>
      <span class="device-name">EX-001</span>
      <span class="device-location">&#128205; A栋 1F 大厅</span>
    </div>
    <span class="status-badge status-normal">&#10004; 正常</span>
  </div>
  <div class="sensor-grid">
    <div class="sensor-item">
      <span class="sensor-icon">&#127777;</span>
      <span class="sensor-value">27.2&#8451;</span>
      <span class="sensor-label">温度</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#128207;</span>
      <span class="sensor-value">3.5cm</span>
      <span class="sensor-label">距离</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#127912;</span>
      <span class="sensor-value" style="color:#52c41a">Green</span>
      <span class="sensor-label">颜色</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#128268;</span>
      <span class="sensor-value">375</span>
      <span class="sensor-label">启动次数</span>
    </div>
  </div>
  <div class="update-time">更新于 刚刚</div>
</div>

<!-- 设备 2：报警状态 -->
<div class="device-card alarm-card" onclick="location.href='detail.html?id=EX-002'">
  <div class="card-header">
    <div>
      <span class="device-name">EX-002</span>
      <span class="device-location">&#128205; A栋 2F 走廊</span>
    </div>
    <span class="status-badge status-alarm">&#128293; 报警</span>
  </div>
  <div class="sensor-grid">
    <div class="sensor-item">
      <span class="sensor-icon">&#127777;</span>
      <span class="sensor-value" style="color:#ff4d4f">58.6&#8451;</span>
      <span class="sensor-label">温度</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#128207;</span>
      <span class="sensor-value">2.1cm</span>
      <span class="sensor-label">距离</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#127912;</span>
      <span class="sensor-value" style="color:#ff4d4f">Red</span>
      <span class="sensor-label">颜色</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#128268;</span>
      <span class="sensor-value">128</span>
      <span class="sensor-label">启动次数</span>
    </div>
  </div>
  <div class="alarm-reason">&#9888; 温度过高，超过安全阈值50&#8451;</div>
  <div class="update-time">更新于 2分钟前</div>
</div>

<!-- 设备 3：离线 -->
<div class="device-card" onclick="location.href='detail.html?id=EX-003'">
  <div class="card-header">
    <div>
      <span class="device-name">EX-003</span>
      <span class="device-location">&#128205; B栋 1F 仓库</span>
    </div>
    <span class="status-badge status-offline">&#9208; 离线</span>
  </div>
  <div class="sensor-grid">
    <div class="sensor-item">
      <span class="sensor-icon">&#127777;</span>
      <span class="sensor-value" style="color:#999">--</span>
      <span class="sensor-label">温度</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#128207;</span>
      <span class="sensor-value" style="color:#999">--</span>
      <span class="sensor-label">距离</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#127912;</span>
      <span class="sensor-value" style="color:#999">--</span>
      <span class="sensor-label">颜色</span>
    </div>
    <div class="sensor-item">
      <span class="sensor-icon">&#128268;</span>
      <span class="sensor-value">89</span>
      <span class="sensor-label">启动次数</span>
    </div>
  </div>
  <div class="update-time">更新于 1小时前</div>
</div>

<div class="refresh-hint">每 5 秒自动刷新 &#183; 下拉手动刷新</div>
<div class="bottom-spacer"></div>

<!-- TabBar -->
<div class="tabbar">
  <a href="index.html" class="tab-item active">
    <span class="tab-icon">&#128225;</span>
    <span class="tab-label">设备</span>
  </a>
  <a href="alarms.html" class="tab-item">
    <span class="tab-icon">&#128680;</span>
    <span class="tab-label">报警</span>
  </a>
</div>

</body>
</html>
